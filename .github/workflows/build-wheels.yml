name: Build Wheels

on:
  push:
    branches:
      - master
      - 'dev/**'
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - 'dev/**'

permissions:
  id-token: write
  contents: read

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            platform: linux
            arch: x86_64
          - runs_on: ubuntu-24.04-arm
            platform: linux
            arch: aarch64
          - runs_on: windows-latest
            platform: windows
            arch: amd64
          - runs_on: windows-11-arm
            platform: windows
            arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build custom build image
        if: matrix.platform == 'linux'
        run: |
          docker build \
            -t custom-cuda-builder \
            --build-arg MANYLINUX_IMAGE=quay.io/pypa/manylinux2014_${{ matrix.arch }} \
            -f docker/cuda-on-manylinux.Dockerfile \
            .

      - name: Build Windows binaries
        if: matrix.platform == 'windows'
        env:
          VCVARS_ARCH: ${{ matrix.arch == 'amd64' && 'x64' || matrix.arch }}
          DETOURS_TARGET_PROCESSOR: ${{ matrix.arch == 'amd64' && 'X64' || 'ARM64' }}
          DETOURS_LIB_DIR: C:/Detours/lib.${{ matrix.arch == 'amd64' && 'X64' || 'ARM64' }}
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set "VS_PATH=%%i"
          call "%VS_PATH%\VC\Auxiliary\Build\vcvarsall.bat" %VCVARS_ARCH%

          if exist C:\Detours rmdir /s /q C:\Detours
          git clone --depth 1 https://github.com/microsoft/Detours.git C:\Detours
          pushd C:\Detours
          nmake
          popd

          del /q comfy_aimdo\*.dll 2>nul
          cl.exe /LD /O2 ^
            src/*.c src-cuda/dispatch.c src-win/*.c ^
            /Isrc /Isrc-win /IC:/Detours/include /FIcompiler.h /Fe:comfy_aimdo/aimdo.dll ^
            /link /LIBPATH:%DETOURS_LIB_DIR% ^
            dxgi.lib dxguid.lib detours.lib onecore.lib
          cl.exe /LD /O2 /D__HIP_PLATFORM_AMD__ ^
            src/*.c src-hip/dispatch.c src-win/*.c ^
            /Isrc /Isrc-win /IC:/Detours/include /FIcompiler.h /Fe:comfy_aimdo/aimdo_rocm.dll ^
            /link /LIBPATH:%DETOURS_LIB_DIR% ^
            dxgi.lib dxguid.lib detours.lib onecore.lib
        shell: cmd

      - name: Build Windows Intel XPU binary
        # Intel XPU only exists on x86_64; reuse the Detours build from the step above.
        if: matrix.platform == 'windows' && matrix.arch == 'amd64'
        env:
          # Must be recent enough to export zeDriverGetDefaultContext and
          # zeDeviceSynchronize, which the XPU shim uses (added in newer L0 loaders).
          LEVEL_ZERO_VERSION: 1.30.0
          VCVARS_ARCH: x64
          DETOURS_LIB_DIR: C:/Detours/lib.X64
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set "VS_PATH=%%i"
          call "%VS_PATH%\VC\Auxiliary\Build\vcvarsall.bat" %VCVARS_ARCH%

          set "LZ_DIR=%RUNNER_TEMP%\level-zero"
          if exist "%LZ_DIR%" rmdir /s /q "%LZ_DIR%"
          curl -L -o "%RUNNER_TEMP%\level-zero-win-sdk.zip" ^
            "https://github.com/oneapi-src/level-zero/releases/download/v%LEVEL_ZERO_VERSION%/level-zero-win-sdk-%LEVEL_ZERO_VERSION%.zip"
          powershell -NoProfile -Command "Expand-Archive -Path '%RUNNER_TEMP%\level-zero-win-sdk.zip' -DestinationPath '%LZ_DIR%' -Force"

          REM src-win\*.c minus cuda-detour.c (its aimdo_setup_hooks/aimdo_teardown_hooks
          REM clash with src-xpu\ze-detour.c). The remaining src-win files are the
          REM platform helpers the upstream src\*.c depends on.
          cl.exe /LD /O2 ^
            src\*.c src-xpu\*.c ^
            src-win\model-mmap.c src-win\shmem-detect.c src-win\module-load.c ^
            src-win\hostbuf-plat.c src-win\thread-plat.c src-win\xfer-file-plat.c ^
            /DAIMDO_XPU /FIcompiler.h /Isrc-xpu /Isrc /Isrc-win ^
            /I"%LZ_DIR%\include" /IC:/Detours/include /Fe:comfy_aimdo\aimdo_xpu.dll ^
            /link /LIBPATH:"%LZ_DIR%\lib" /LIBPATH:%DETOURS_LIB_DIR% ^
            ze_loader.lib detours.lib dxgi.lib dxguid.lib onecore.lib
          if not exist comfy_aimdo\aimdo_xpu.dll exit /b 1

      - name: Build default Stub Wheel
        if: matrix.platform == 'linux' && matrix.arch == 'x86_64'
        run: |
          pip install build
          rm -f comfy_aimdo/*.so comfy_aimdo/*.dll
          python -m build --wheel --outdir wheelhouse-none/

      - name: Upload Stub Wheel
        if: matrix.platform == 'linux' && matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: wheels-none
          path: ./wheelhouse-none/*.whl

      - name: Pre-fetch virtualenv.pyz (Windows)
        if: matrix.platform == 'windows'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $dest = "$env:LOCALAPPDATA\pypa\cibuildwheel\Cache\virtualenv-20.26.6.pyz"
          New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
          $headers = @{ Authorization = "token $env:GH_TOKEN" }
          $url = "https://github.com/pypa/get-virtualenv/blob/20.26.6/public/virtualenv.pyz?raw=true"
          Invoke-WebRequest -Uri $url -OutFile $dest -Headers $headers -UseBasicParsing
          Write-Host "✅ Downloaded virtualenv.pyz"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: custom-cuda-builder
          CIBW_MANYLINUX_AARCH64_IMAGE: custom-cuda-builder
          CIBW_BUILD: ${{ matrix.platform == 'linux' && format('cp39-manylinux_{0}', matrix.arch) || format('cp39-win_{0}', matrix.arch) }}
          CIBW_BEFORE_BUILD_LINUX: bash ./scripts/build-linux-aimdo.sh
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair --exclude libcuda.so.1 -w {dest_dir} {wheel}"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    environment: pypi
    permissions:
      id-token: write  # Required for Trusted Publishing

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Publish to PyPI Test
        if: github.ref == 'refs/heads/master'
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password/token needed with Trusted Publishing!
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
